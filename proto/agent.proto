syntax = "proto3";

package agent;

service AgentService {
  rpc ExecuteTool(ToolExecutionRequest) returns (ToolExecutionResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetMetrics(MetricsRequest) returns (MetricsResponse);
  rpc GetSystemStats(SystemStatsRequest) returns (SystemStatsResponse);
}

message ToolExecutionRequest {
  string tool_name = 1;
  string input = 2;
}

message ToolExecutionResponse {
  string result = 1;
  string error = 2;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string status = 2;
}

message MetricsRequest {}

message MetricsResponse {
  map<string, double> metrics = 1;
}

message SystemStatsRequest {}

message SystemStatsResponse {
  double cpu_usage = 1;
  double memory_usage = 2;
  int64 active_connections = 3;
}
