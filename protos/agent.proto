syntax = "proto3";

package agent;

service AgentService {
  rpc ExecuteTool (ToolRequest) returns (ToolResponse);
  rpc GetMetrics (MetricsRequest) returns (MetricsResponse);
  rpc HealthCheck (HealthRequest) returns (HealthResponse);
  // 状态同步相关
  rpc StreamStateUpdates (StateStreamRequest) returns (stream StateUpdate);
  rpc PublishState (StatePublishRequest) returns (StateAck);
  rpc GetCurrentState (StateSnapshotRequest) returns (StateSnapshotResponse);
}

// 工具执行
message ToolRequest {
  string tool_name = 1;
  bytes input_data = 2;
}

message ToolResponse {
  bool success = 1;
  bytes result_data = 2;
  string error_message = 3;
  int64 execution_time_ms = 4;
}

// 指标相关
message MetricsRequest {
  string metric_name = 1;
}

message MetricsResponse {
  map<string, MetricSummary> summaries = 1;
}

message MetricSummary {
  int64 count = 1;
  double sum = 2;
  double average = 3;
  double min = 4;
  double max = 5;
}

// 健康检查
message HealthRequest {}

message HealthResponse {
  string status = 1;
  string timestamp = 2;
  map<string, bool> services = 3;
}

// 状态同步消息
message StateStreamRequest {
  string client_id = 1;      // 客户端唯一标识
  string filter_prefix = 2;  // 状态键过滤前缀（可选）
}

message StateUpdate {
  string key = 1;           // 状态键
  bytes value = 2;          // 状态值（JSON序列化）
  string operation = 3;     // "set" | "delete"
  int64 timestamp = 4;      // 时间戳
  string source = 5;        // 状态源（agent ID）
}

message StatePublishRequest {
  string key = 1;
  bytes value = 2;
  string source = 3;        // agent ID
  int64 timestamp = 4;
}

message StateAck {
  bool accepted = 1;
  string error_message = 2;
}

message StateSnapshotRequest {
  string filter_prefix = 2;  // 可选过滤
}

message StateSnapshotResponse {
  map<string, bytes> state = 1;  // 完整状态快照
  int64 timestamp = 2;
}
